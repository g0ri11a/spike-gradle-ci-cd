name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_id:
        description: "아티팩트를 가져올 CI 워크플로우의 Run ID (수동 실행 시 필수)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          run-id: ${{ inputs.run_id || github.event.workflow_run.id }}
          path: ./
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load Version Info
        run: |
          cat version >> $GITHUB_ENV

      - name: Publish to Maven Repository
        run: ./gradlew publish -x assemble -x test -x smokeTest -x regressionTest -x functionTest
        env:
          MAVEN_REPO_URL: "https://maven.pkg.github.com/${{ github.repository }}"
          MAVEN_REPO_USERNAME: ${{ github.actor }}
          MAVEN_REPO_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git Tag
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag v${{ env.VERSION }} already exists. Skipping tag creation."
          else
            git tag v${{ env.VERSION }}
            git push origin v${{ env.VERSION }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
