def registerTestType(String name, String desc) {
    // 1. SourceSet 설정
    sourceSets.create(name) {
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }

    // 2. Configuration 상속 설정
    configurations."${name}Implementation".extendsFrom(configurations.implementation)
    configurations."${name}RuntimeOnly".extendsFrom(configurations.runtimeOnly)
    configurations."${name}CompileOnly".extendsFrom(configurations.compileOnly)
    configurations."${name}AnnotationProcessor".extendsFrom(configurations.annotationProcessor)

    // 3. Task 등록
    tasks.register(name, Test) {
        description = desc
        group = 'verification'
        testClassesDirs = sourceSets."${name}".output.classesDirs
        classpath = sourceSets."${name}".runtimeClasspath
    }
}

// 외부에서 사용할 수 있도록 프로젝트 확장 속성에 추가
project.ext.registerTestType = this.&registerTestType